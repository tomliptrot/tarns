<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scottish High Lochs</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<!-- Serve locally with: python -m http.server -->
<body>
  <div id="tab-bar">
    <button class="tab-btn active" data-tab="map">Map</button>
    <button class="tab-btn" data-tab="data">Data</button>
  </div>

  <div id="map-tab" class="tab-content active">
    <div id="map"></div>
    <div id="filter-panel">
      <h3>Filters <button id="filter-toggle" onclick="toggleFilters()">&#9650;</button></h3>
      <div id="filter-body">
      <div class="units-toggle">
        <label><input type="radio" name="units" value="metric" checked> Metric</label>
        <label><input type="radio" name="units" value="imperial"> Imperial</label>
      </div>
      <div class="filter-group">
        <label>Min elevation: <span id="elev-val">500</span> <span id="elev-unit">m</span></label>
        <input type="range" id="elev-min" min="0" max="1000" value="500" step="10">
      </div>
      <div class="filter-group">
        <label>Min length: <span id="len-val">300</span> <span id="len-unit">m</span></label>
        <input type="range" id="len-min" min="0" max="3000" value="300" step="10">
      </div>
      <div class="filter-group">
        <label>Min area: <span id="area-val">0</span> <span id="area-unit">ha</span></label>
        <input type="range" id="area-min" min="0" max="100" value="0" step="0.1">
      </div>
      <div id="count-display">
        Showing <strong><span id="count">0</span></strong> of <strong><span id="total">0</span></strong>
      </div>
      <button id="export-btn" onclick="exportCSV()">Export CSV</button>
      </div>
    </div>
  </div>

  <div id="data-tab" class="tab-content">
    <div id="table-container">
      <table id="lochs-table" class="display" width="100%">
        <thead>
          <tr>
            <th>Name</th>
            <th>Country</th>
            <th>Elevation (m)</th>
            <th>Area (ha)</th>
            <th>Length (m)</th>
            <th>Lat</th>
            <th>Lon</th>
            <th>Links</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.3/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.8.1/proj4.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4leaflet/1.0.2/proj4leaflet.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
